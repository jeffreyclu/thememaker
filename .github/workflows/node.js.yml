# Clean-installs dependencies, lints, tests, and builds the extension across
# supported Node versions, then uploads the built dist/ as a zipped artifact.
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Node.js CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      # upload-artifact@v4 zips the directory contents automatically.
      - name: Upload built extension (dist)
        uses: actions/upload-artifact@v4
        with:
          name: thememaker-dist-node-${{ matrix.node-version }}
          path: dist/
          if-no-files-found: error
