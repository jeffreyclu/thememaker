<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thememaker</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <h1 class="popup__title">Thememaker</h1>
      </header>

      <div class="popup__row">
        <label class="popup__label" for="mode">Mode</label>
        <select id="mode" class="popup__select"></select>
      </div>

      <div class="popup__row">
        <label class="popup__label" for="intensity">Intensity</label>
        <input
          id="intensity"
          class="popup__slider"
          type="range"
          min="10"
          max="100"
          step="1"
          value="80"
          aria-valuemin="10"
          aria-valuemax="100"
          aria-valuenow="80"
        />
        <output id="intensity-value" class="popup__slider-value" for="intensity"
          >80</output
        >
      </div>

      <div class="popup__row popup__row--between">
        <span class="popup__label" id="surprise-label"
          >Surprise me (online)</span
        >
        <button
          id="surprise-toggle"
          class="toggle"
          type="button"
          role="switch"
          aria-checked="false"
          aria-labelledby="surprise-label"
        >
          <span class="toggle__track"><span class="toggle__thumb"></span></span>
        </button>
      </div>

      <div class="popup__actions">
        <button id="generate" class="btn btn--primary" type="button">
          Generate
        </button>
        <button id="save" class="btn" type="button" disabled>Save</button>
        <button id="reset" class="btn" type="button" disabled>Reset</button>
      </div>

      <p id="status" class="popup__status" role="status" aria-live="polite"></p>

      <section class="popup__section">
        <div class="popup__row popup__row--between">
          <span class="popup__label">Apply on this site</span>
          <button
            id="site-toggle"
            class="toggle"
            type="button"
            role="switch"
            aria-checked="false"
          >
            <span class="toggle__track"
              ><span class="toggle__thumb"></span
            ></span>
          </button>
        </div>
      </section>

      <section class="popup__section">
        <button
          id="details-toggle"
          class="disclosure"
          type="button"
          aria-expanded="false"
          aria-controls="details"
          disabled
        >
          Details
        </button>
        <div id="details" class="details" hidden></div>
      </section>

      <section class="popup__section">
        <h2 class="popup__subtitle">History</h2>
        <ul id="history" class="history" aria-label="Scheme history"></ul>
      </section>
    </main>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
